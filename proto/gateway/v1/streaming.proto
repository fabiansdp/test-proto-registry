syntax = "proto3";
package gateway.v1;

service StreamGatewayService {
  // Receives a message stream and processes it to do something
  rpc RecordSensor(stream RecordSensorRequest) returns (RecordSensorResponse);
}

message RecordSensorRequest {
  string device_id = 1;
  string msg = 2;
}

message RecordSensorResponse {
  int32 num_msg = 1;
}
