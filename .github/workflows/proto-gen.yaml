name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  pull_request:
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Buf
        run: |
          BUF_VERSION="1.50.0"
          sudo curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-$(uname -s)-$(uname -m)" -o /usr/local/bin/buf
          sudo chmod +x /usr/local/bin/buf
          buf --version

      - name: Install protoc and protoc-gen-prost-crate
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          cargo install protoc-gen-prost-crate
          sudo cp "$HOME/.cargo/bin/protoc-gen-prost-crate" /usr/local/bin/
          which protoc-gen-prost-crate

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate

      - name: Commit generated stubs
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gen/rust

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(gen): regenerate rust gRPC stubs [skip ci]"
            git push
          fi