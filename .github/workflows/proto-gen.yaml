name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  pull_request:
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml.tmpl') }}

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-prost-crate
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        run: cargo install protoc-gen-prost-crate

      - name: Verify toolchain
        run: |
          echo "PATH=$PATH"
          which protoc && protoc --version
          which protoc-gen-prost-crate && echo "protoc-gen-prost-crate found"

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate

      - name: Commit generated stubs
        uses: iarekylew00t/verified-bot-commit@v2
        if: github.event_name != 'pull_request'
        with:
          message: 'chore(gen): regenerate rust gRPC stubs [skip ci]'
          files: |
            **