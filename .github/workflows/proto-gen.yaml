name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "cargo.toml.tmpl"
  pull_request:
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "cargo.toml.tmpl"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache toolchain and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.local/bin/protoc
            ~/.local/include/google/
          key: ${{ runner.os }}-toolchain-${{ hashFiles('cargo.toml.tmpl') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc and protoc-gen-prost-crate
        run: |
          if [ ! -f "$HOME/.local/bin/protoc" ]; then
            echo "Installing protoc..."
            PROTOC_VERSION=29.3
            curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
            unzip -o /tmp/protoc.zip -d "$HOME/.local" bin/protoc include/*
            rm /tmp/protoc.zip
          else
            echo "protoc found in cache, skipping install"
          fi

          if [ ! -f "$HOME/.cargo/bin/protoc-gen-prost-crate" ]; then
            echo "Installing protoc-gen-prost-crate..."
            cargo install protoc-gen-prost-crate
          else
            echo "protoc-gen-prost-crate found in cache, skipping install"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate

      - name: Commit generated stubs
        uses: iarekylew00t/verified-bot-commit@v2
        if: github.event_name != 'pull_request'
        with:
          message: 'chore(gen): regenerate rust gRPC stubs [skip ci]'
          files: |
            **