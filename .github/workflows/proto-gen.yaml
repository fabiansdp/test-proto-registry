name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
  pull_request:
    paths:
      - "proto/**"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache toolchain binaries
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.local/bin/protoc
            ~/.local/include/google
          key: ${{ runner.os }}-tools-protoc-prost-crate-v1
          restore-keys: |
            ${{ runner.os }}-tools-

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install protoc
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          PROTOC_VERSION=29.3
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d "$HOME/.local" bin/protoc include/*
          rm /tmp/protoc.zip

      - name: Install protoc-gen-prost-crate
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install protoc-gen-prost-crate

      - name: Add tools to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate

      - name: Commit generated stubs
        uses: iarekylew00t/verified-bot-commit@v2
        if: github.event_name != 'pull_request'
        with:
          message: 'chore(gen): regenerate rust gRPC stubs [skip ci]'
          files: |
            **