name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  pull_request:
    paths:
      - "proto/**"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "Cargo.toml.tmpl"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Buf
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/buf
            ~/.buf
          key: ${{ runner.os }}-buf-${{ hashFiles('proto/buf.yaml', 'proto/buf.gen.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buf-

      - name: Run Buf Generate
        uses: bufbuild/buf-action@v1
        with:
          input: proto
          push: false
          lint: true
          breaking: true
          format: false
          generate: true

      - name: Commit generated stubs
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gen/rust

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(gen): regenerate rust gRPC stubs [skip ci]"
            git push
          fi