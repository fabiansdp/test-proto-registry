name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
  pull_request:
    paths:
      - "proto/**"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-prost-crate
        run: |
          which protoc-gen-prost-crate && echo "protoc-gen-prost-crate already installed" || cargo install protoc-gen-prost-crate
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate --verbose

      - name: Commit generated stubs
        uses: iarekylew00t/verified-bot-commit@v2
        if: github.event_name != 'pull_request'
        with:
          message: 'chore(gen): regenerate rust gRPC stubs [skip ci]'
          files: |
            **