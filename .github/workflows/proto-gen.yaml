name: Generate gRPC Stubs

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
  pull_request:
    paths:
      - "proto/**"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rust gRPC Stubs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache cargo installed binaries separately — these rarely change
      # and are expensive to rebuild. Keyed on the template so it busts
      # when crate dependencies change.
      - name: Cache cargo binaries
        id: cache-cargo-bin
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.toml.tmpl') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bin-

      # Cache the cargo registry and git indices for faster dependency
      # resolution. Uses proto file hashes since there's no Cargo.lock
      # checked in (the crate is generated).
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('proto/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      # Use the dedicated protoc installer action (cached internally)
      # instead of apt-get which re-downloads every run.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Only run cargo install when the binary isn't already in cache.
      - name: Install protoc-gen-prost-crate
        if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
        run: cargo install protoc-gen-prost-crate

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Buf Lint
        run: buf lint

      - name: Generate stubs
        run: buf generate

      - name: Commit generated stubs
        uses: iarekylew00t/verified-bot-commit@v2
        if: github.event_name != 'pull_request'
        with:
          message: 'chore(gen): regenerate rust gRPC stubs [skip ci]'
          files: |
            **