version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-prost
    out: gen/rust/src
    opt:
      - compile_well_known_types=false
      - extern_path=.google.protobuf=::prost_types

  - local: protoc-gen-tonic
    out: gen/rust/src
    opt:
      - compile_well_known_types=false
      - extern_path=.google.protobuf=::prost_types

  - local: protoc-gen-prost-crate
    out: gen/rust
    opt:
      - gen_crate=Cargo.toml.tmpl